      <!--=============== CSS ===============-->
      <link rel="stylesheet" href="style.css">

      <title>Ashini Akasha</title>
   </head>
   <body>
      <!--==================== HEADER ====================-->
      <header class="header" id="header">
         <nav class="nav container">
            <a href="#" class="nav__logo">
                <span class="nav__logo-circle">A</span>
                <span class="nav__logo-name">Ashini Akasha.</span>
            </a>
            <div class="nav__menu" id="nav-menu">
                <span class="nav__title">Menu</span>

                <h3 class="nav__name">Ashini</h3>

                <ul class="nav__list">
                    <li class=".nav__link">
                        <a href="#home" class="nav__link">Home</a>
                    </li>
                    <li class=".nav__link">
                        <a href="#about" class="nav__link">About Me</a>
                    </li>
                    <li class=".nav__link">
                        <a href="https://medium.com/@akashaashini18/beginner-to-builder-learn-html-step-by-step-6bc6a5793bd5" class="nav__link">Blog Page</a>
                    </li>
                    <li class=".nav__link">
                        <a href="#contact me" class="nav__link-button">Contact me</a>
                    </li>
                </ul>
                <!--Close button-->
                <div class="nav__close" id="nav-close">
                   <i class="ri-close-line"></i>
                </div>
            </div>
            <div class="nav__buttons">
                <!--Toggle button-->
                <div class="nav__toggle" id="nav-toggle">
                    <i class="ri-menu-4-line"></i>
                </div>
            </div>
         </nav>
      </header>

      <!--==================== MAIN ====================-->
      <main class="main">
         <!--==================== HOME ====================-->
         <section class="home section" id="home">
            <div class="home__container container grid">
                <h1 class="home__name">
                    Ashini Akasha
                </h1>       

                <div class="home__perfil">
                    <div class="home__image">
                        <img src="me.jpeg" alt="my picture" class="home__img">
                        <div class="home__shadow"></div>
                        <img src="ncurved-arrow.svg" alt="arrow image" class="home_arrow">
                        <img src="random-lines.svg" alt="line image" class="home_line">

                        <div class="geometric-box"></div>
                    </div>
                    <div class="home__social">
                        <a href="https://github.com/ashiniakasha2005" target="_blank" class="home__social-link">
                            <i class="ri-github-fill"></i>
                        </a>

                        <a href="https://www.linkedin.com/in/ashini-akasha-65ab873a7?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" target="_blank" class="home__social-link">
                            <i class="ri-linkedin-box-line"></i>
                        </a>

                        <a href="https://www.facebook.com/profile.php?id=61553660049819&sfnsn=wa&mibextid=RUbZ1f" target="_blank" class="home__social-link">
                            <i class="ri-facebook-circle-line"></i>
                        </a>
                    </div>
                </div>

                <div class="home__info">
                    <p class="home__description">
                        <b>Frontend Developer</b>, with knowledge in web development and design.
                    </p>

                    <a href="#about" class="home__scroll">
                        <div class="home__scroll-box">
                            <i class="ri-arrow-down-s-line"></i>
                        </div>
                        <span class="home__scroll-text">Scroll Down</span>
                    </a>
                    </div>
                </div>
            </div>
         </section>

         <!--==================== ABOUT ====================-->
         <section class="about section" id="about">
            <div class="about__container container grid">
                <h2 class="section__title-1">
                    About Me.
                </h2>
                <div class="about__perfil">
                    <div class="about__image">
                        <img src="me-1.jpeg" alt="my image" class="about__img">

                        <div class="about__shadow"></div>

                        <div class="geometric-box"></div>
                        <img src="random-lines.svg" alt="" class="about__lines">
                
                        <div class="about__box"></div>
                    </div>
                </div>
                <div class="about__info">
                    <div class="about__buttons">
                        <a href="mycv.pdf" class="button">Download My CV</a>
                    </div>
                </div>
            </div>
         </section>

         <!--==================== CONTACT ====================-->
         <section class="contact section" id="contact">
            <h2 class="section__title-1">Contact Me</h2>
                <form id="contactForm" class="contact__form">
                    <input type="text" id="name" placeholder="Your Name" required>
                    <input type="email" id="email" placeholder="Your Email" required>
                    <input type="text" id="subject" placeholder="Subject" required>
                    <textarea id="message" placeholder="Message" rows="5" required></textarea>
                    <button type="submit">Submit</button>
                </form>
                <div class="message" id="formMessage"></div>
         </section>
      </main>

      <footer class="footer">
